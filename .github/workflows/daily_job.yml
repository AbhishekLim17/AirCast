name: AirCast Daily Job

on:
  # Runs every day at 23:30 UTC = 5:00 AM IST (next day)
  schedule:
    - cron: "30 23 * * *"

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  daily-aqi-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Run daily AQI job
        run: |
          set -o pipefail
          python -m scheduler.daily_job 2>&1 | tee daily_job.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-logs-${{ github.run_id }}
          path: daily_job.log
          retention-days: 7

    env:
      WAQI_API_TOKEN:        ${{ secrets.WAQI_API_TOKEN }}
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
      HF_TOKEN:              ${{ secrets.HF_TOKEN }}
      HF_USERNAME:           ${{ secrets.HF_USERNAME }}
      HF_REPO_NAME:          ${{ secrets.HF_REPO_NAME }}
      RETRAIN_MAE_THRESHOLD: ${{ secrets.RETRAIN_MAE_THRESHOLD }}
